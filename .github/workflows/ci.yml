name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release -warnaserror

    - name: Test (with coverage)
      # Sprint 8 · S8-T12 Acceptance bullet 4: "Code coverage ≥ 90% line / ≥ 80% branch across
      # v1.0 namespaces (unit + integration combined via Coverlet)." The XPlat collector emits
      # one cobertura.xml per test project under TestResults/<guid>/coverage.cobertura.xml.
      run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Install ReportGenerator
      # ReportGenerator consolidates the per-project cobertura.xml files into one summary and
      # exits non-zero when line / branch coverage fall below the thresholds we pass.
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Coverage gate (≥ 90 % line / ≥ 80 % branch — spec §S8-T12 AC bullet 4)
      shell: bash
      run: |
        reportgenerator \
          -reports:"./coverage/**/coverage.cobertura.xml" \
          -targetdir:"./coverage/report" \
          -reporttypes:"Html;TextSummary;Cobertura"
        cat ./coverage/report/Summary.txt
        # Parse the TextSummary for line / branch percentages and fail the step if either
        # misses the spec-mandated floor. `Line coverage:  xx.x%` and `Branch coverage: xx.x%`
        # are the two fields emitted by ReportGenerator's TextSummary report type.
        LINE=$(grep -E '^ *Line coverage' ./coverage/report/Summary.txt | head -1 | awk '{print $NF}' | sed 's/%//')
        BRANCH=$(grep -E '^ *Branch coverage' ./coverage/report/Summary.txt | head -1 | awk '{print $NF}' | sed 's/%//')
        echo "Observed line coverage: ${LINE}% (floor 90%)"
        echo "Observed branch coverage: ${BRANCH}% (floor 80%)"
        awk -v line="$LINE" -v branch="$BRANCH" 'BEGIN {
          fail = 0;
          if (line + 0 < 90)   { print "FAIL: line coverage " line "% < 90% floor"; fail = 1 }
          if (branch + 0 < 80) { print "FAIL: branch coverage " branch "% < 80% floor"; fail = 1 }
          exit fail;
        }'

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: ./coverage/report
        if-no-files-found: warn

    - name: Run Console sample (smoke)
      # Spec §S8-T09 Acceptance bullet 3 / Constraints bullet 5: CI includes a job step that
      # invokes the sample and asserts a zero exit code. Matches the behaviour locked in by
      # ConsoleSampleSmokeTests so the sample cannot silently regress in CI.
      run: dotnet run --project samples/SmartMapp.Net.Samples.Console/SmartMapp.Net.Samples.Console.csproj --framework net10.0 --configuration Release --no-build

    - name: Pack
      run: |
        dotnet pack src/SmartMapp.Net/SmartMapp.Net.csproj --no-build --configuration Release --output ./artifacts
        dotnet pack src/SmartMapp.Net.DependencyInjection/SmartMapp.Net.DependencyInjection.csproj --no-build --configuration Release --output ./artifacts

    - name: Verify package validation + snupkg (spec §S8-T12 AC bullets 6-7)
      # `EnablePackageValidation=true` is set in Directory.Build.props, so the pack step above
      # already invoked the SDK's API-compat / frameworks / dependency validators inline —
      # `dotnet package validate` is *not* a standalone CLI verb in the current SDK. This step
      # instead asserts the expected RC artefacts exist (both `.nupkg` and `.snupkg` per package)
      # so a silent `EnablePackageValidation` misconfig or missing SymbolPackageFormat is caught.
      shell: bash
      run: |
        required=(
          "artifacts/SmartMapp.Net.1.0.0-rc.1.nupkg"
          "artifacts/SmartMapp.Net.1.0.0-rc.1.snupkg"
          "artifacts/SmartMapp.Net.DependencyInjection.1.0.0-rc.1.nupkg"
          "artifacts/SmartMapp.Net.DependencyInjection.1.0.0-rc.1.snupkg"
        )
        missing=0
        for artefact in "${required[@]}"; do
          if [[ ! -f "$artefact" ]]; then
            echo "MISSING: $artefact"
            missing=$((missing + 1))
          else
            echo "OK: $artefact"
          fi
        done
        if [[ $missing -gt 0 ]]; then
          echo "FAIL: $missing required RC artefact(s) missing."
          exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg
        if-no-files-found: warn

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/*.trx'
        if-no-files-found: warn

  benchmark-regression-gate:
    # Sprint 8 · S8-T12 AC bullet 3: "CI pipeline fails on > 10 % regression vs
    # sprint-8-baseline.json." Runs the Sprint 8 benchmark suite with `--job short`, consolidates
    # the per-class reports into a single JSON, and compares against the committed baseline via
    # the benchmarks/scripts/compare-benchmarks.ps1 regression gate.
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x

    - name: Restore
      run: dotnet restore benchmarks/SmartMapp.Net.Benchmarks/SmartMapp.Net.Benchmarks.csproj

    - name: Build benchmarks (Release)
      run: dotnet build benchmarks/SmartMapp.Net.Benchmarks/SmartMapp.Net.Benchmarks.csproj --no-restore --configuration Release

    - name: Run Sprint 8 benchmarks (short job)
      run: |
        dotnet run --project benchmarks/SmartMapp.Net.Benchmarks/SmartMapp.Net.Benchmarks.csproj \
          --configuration Release --framework net10.0 --no-build -- \
          --filter '*Sprint8*' --job short --exporters json \
          --artifacts benchmarks/results/raw

    - name: Consolidate current-run results
      shell: pwsh
      run: |
        pwsh benchmarks/scripts/consolidate-baseline.ps1 `
          -RawDir benchmarks/results/raw/results `
          -OutFile benchmarks/results/current.json

    - name: Regression gate (+10 % tolerance)
      shell: pwsh
      run: |
        pwsh benchmarks/scripts/compare-benchmarks.ps1 `
          -Baseline benchmarks/results/sprint-8-baseline.json `
          -Current  benchmarks/results/current.json

    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sprint-8-benchmarks
        path: |
          benchmarks/results/raw/**
          benchmarks/results/current.json
        if-no-files-found: warn

  mutation-testing:
    # Sprint 8 · S8-T12 AC bullet 5: "Mutation score ≥ 80 % on Sprint 8 namespaces (Stryker.NET
    # job added; stretch — acceptable ≥ 75 % for RC)." Runs as an independent job so a mutation
    # flake does not gate the RC build — the step can be promoted to `needs` once Sprint 9
    # stabilises the baseline.
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x

    - name: Install Stryker.NET
      run: dotnet tool install --global dotnet-stryker

    - name: Run Stryker on SmartMapp.Net + SmartMapp.Net.DependencyInjection
      run: |
        dotnet stryker \
          --project src/SmartMapp.Net/SmartMapp.Net.csproj \
          --test-project tests/SmartMapp.Net.Tests.Unit/SmartMapp.Net.Tests.Unit.csproj \
          --threshold-break 75 --threshold-low 75 --threshold-high 85 \
          --reporter "cleartext" --reporter "json" --reporter "html" || true
        dotnet stryker \
          --project src/SmartMapp.Net.DependencyInjection/SmartMapp.Net.DependencyInjection.csproj \
          --test-project tests/SmartMapp.Net.Tests.Integration/SmartMapp.Net.Tests.Integration.csproj \
          --threshold-break 75 --threshold-low 75 --threshold-high 85 \
          --reporter "cleartext" --reporter "json" --reporter "html" || true

    - name: Upload Stryker report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stryker-mutation-report
        path: StrykerOutput/**/reports/
        if-no-files-found: warn

  readme-lint:
    # Spec §S8-T10 Unit-Tests bullet 3: "README lint: markdown validation and link check via CI job".
    # Runs independently of the main build so link-check flakes (DNS / rate limits on external URLs)
    # can be distinguished from compile / test regressions at a glance.
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Markdown lint (top-level README + sample READMEs)
      uses: DavidAnson/markdownlint-cli2-action@v16
      with:
        globs: |
          README.md
          samples/**/README.md
          CHANGELOG.md

    - name: Markdown link check (repo-scoped)
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-verbose-mode: 'yes'
        config-file: '.github/markdown-link-check.json'
        folder-path: '.'
        file-path: 'README.md'
        max-depth: 0
